<!doctype html>
<html lang="{{html_lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
/*__POMODORO_CSS__*/
  </style>
</head>
<body>
  <section id="corner-badge" class="corner-badge" aria-label="{{corner_aria}}">
    <div id="drag-handle" class="drag-handle" title="{{tooltip_drag_corner}}">
      <span></span>
    </div>

    <div class="timer-row">
      <div class="ring" aria-hidden="true">
        <svg viewBox="0 0 36 36">
          <circle class="ring-bg" cx="18" cy="18" r="16"></circle>
          <circle id="ring-progress" class="ring-progress" cx="18" cy="18" r="16"></circle>
        </svg>
      </div>
      <div class="timer-copy">
        <div id="mode-label" class="mode-label"><img src="{{tomato_icon_src}}" alt="" class="brand-logo" /><span id="mode-text">{{mode_pomodoro}}</span></div>
        <div id="timer-text" class="timer-text">25:00</div>
      </div>
    </div>

    <div class="soft-divider"></div>

    <button class="session-row" data-action="session" type="button">
      <span id="session-text">{{mode_pomodoro}} 1</span>
    </button>

    <div class="xp-block">
      <div class="xp-row">
        <button id="experience-button" data-action="experience" type="button" class="text-button">
          <img id="experience-icon" src="{{growth_icon_src}}" alt="" class="metric-icon" />
          <span class="experience-copy">
            <strong id="experience-level">{{level_short}} 1</strong>
            <span id="experience-xp">0 / 20 XP</span>
          </span>
        </button>
        <button id="cards-button" data-action="cards" type="button" class="text-button red">
          <img id="cards-icon" src="{{bolt_icon_src}}" alt="" class="metric-icon" />
          <span id="cards-count">+0</span>
        </button>
      </div>
      <div class="mini-progress"><span id="xp-progress"></span></div>
    </div>

    <div class="controls">
      <button id="pause-button" data-action="pause" type="button" title="{{tooltip_pause_resume}}" data-play-src="{{play_icon_src}}" data-pause-src="{{pause_icon_src}}"><img src="{{play_icon_src}}" alt="" class="control-icon" /></button>
      <button id="stop-button" data-action="stop" type="button" title="{{tooltip_stop}}" hidden><img src="{{stop_icon_src}}" alt="" class="control-icon" /></button>
      <button id="audio-button" data-action="audio" type="button" title="{{tooltip_sound}}"><img src="{{soundcloud_icon_src}}" alt="" class="control-icon" /></button>
      <button data-action="settings" type="button" title="{{tooltip_settings}}"><img src="{{settings_icon_src}}" alt="" class="control-icon" /></button>
    </div>

    <div id="inline-audio" class="inline-audio" aria-hidden="true">
      <div class="audio-track">
        <div class="album">&#9834;</div>
        <div class="track-copy">
          <strong>{{audio_title_lofi}}</strong>
          <span>{{audio_source_chillhop}}</span>
        </div>
      </div>
      <div class="mini-progress audio-progress"><span></span></div>
      <div class="audio-controls">
        <button type="button" title="{{action_shuffle}}"><img src="{{shuffle_icon_src}}" alt="" class="audio-control-icon" /></button>
        <button type="button" title="{{action_previous}}"><img src="{{previous_icon_src}}" alt="" class="audio-control-icon" /></button>
        <button id="audio-play-button" type="button" class="play" title="{{action_play}}" aria-pressed="false" data-play-src="{{play_icon_src}}" data-pause-src="{{pause_icon_src}}"><img src="{{play_icon_src}}" alt="" class="audio-control-icon play-icon" /></button>
        <button type="button" title="{{action_next}}"><img src="{{next_icon_src}}" alt="" class="audio-control-icon" /></button>
        <button type="button" title="{{action_loop}}"><img src="{{loop_icon_src}}" alt="" class="audio-control-icon" /></button>
      </div>
      <div class="youtube-row">
        <input type="url" placeholder="{{audio_youtube_placeholder}}">
        <button type="button">{{action_load}}</button>
      </div>
      <p>{{audio_inline_support}}</p>
    </div>

    <button id="streak-button" data-action="streak" type="button" class="footer-row">
      <span class="streak-flame"><img src="{{fire_icon_src}}" alt="" class="metric-icon" /></span>
      <span class="streak-copy">
        <strong id="streak-text">{{streak_initial}}</strong>
        <span id="streak-caption">{{streak_caption_initial}}</span>
      </span>
    </button>
  </section>

  <script>
//__POMODORO_JS__
  </script>
</body>
</html>
