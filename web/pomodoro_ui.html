<!doctype html>
<html lang="{{html_lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
/*__POMODORO_CSS__*/
  </style>
</head>
<body>
  <section id="corner-badge" class="corner-badge" aria-label="{{corner_aria}}">
    <div id="drag-handle" class="badge-header" title="{{tooltip_drag_corner}}">
      <div class="brand-lockup">
        <img src="{{tomato_icon_src}}" alt="" class="brand-logo" />
        <span class="brand-word"><span>Pomo</span><span>VN</span></span>
      </div>
      <span class="drag-grip" aria-hidden="true"></span>
    </div>

    <div class="timer-stage">
      <div class="timer-circle">
        <span id="timer-text" class="timer-text">25:00</span>
      </div>
      <div id="mode-text" class="mode-label">{{mode_pomodoro}}</div>
    </div>

    <div class="metric-grid">
      <button id="experience-button" data-action="experience" type="button" class="metric-chip metric-level">
        <span id="experience-level">1</span>
        <img src="{{growth_icon_src}}" alt="" class="metric-icon" />
      </button>
      <button id="cards-button" data-action="cards" type="button" class="metric-chip metric-cards">
        <span id="cards-count">0</span>
        <img src="{{bolt_icon_src}}" alt="" class="metric-icon" />
      </button>
      <button id="study-time-button" data-action="study_time" type="button" class="metric-chip metric-study-time" title="{{tooltip_study_time}}">
        <span id="study-time-text">0m</span>
        <img src="{{time_icon_src}}" alt="" class="metric-icon" />
      </button>
      <button id="streak-button" data-action="streak" type="button" class="metric-chip metric-streak">
        <span id="streak-text">0</span>
        <img src="{{fire_icon_src}}" alt="" class="metric-icon" />
      </button>
      <button id="retention-button" data-action="retention" type="button" class="metric-chip metric-retention">
        <span id="retention-text">0%</span>
        <img src="{{brain_icon_src}}" alt="" class="metric-icon" />
      </button>
    </div>

    <div class="controls">
      <button id="pause-button" data-action="pause" type="button" title="{{tooltip_pause_resume}}" data-play-src="{{play_icon_src}}" data-pause-src="{{pause_icon_src}}"><img src="{{play_icon_src}}" alt="" class="control-icon" /></button>
      <button id="stop-button" data-action="stop" type="button" title="{{tooltip_stop}}" hidden><img src="{{stop_icon_src}}" alt="" class="control-icon" /></button>
      <button id="session-button" data-action="session" type="button" title="{{tooltip_session_history}}"><img src="{{history_icon_src}}" alt="" class="control-icon" /></button>
      <button id="audio-button" data-action="audio" type="button" title="{{tooltip_sound}}"><img src="{{soundcloud_icon_src}}" alt="" class="control-icon" /></button>
      <button data-action="feedback" type="button" title="{{tooltip_feedback}}"><img src="{{feedback_icon_src}}" alt="" class="control-icon" /></button>
      <button data-action="settings" type="button" title="{{tooltip_settings}}"><img src="{{settings_icon_src}}" alt="" class="control-icon" /></button>
    </div>

    <div id="inline-audio" class="inline-audio" aria-hidden="true">
      <div class="audio-track">
        <div class="album">&#9834;</div>
        <div class="track-copy">
          <strong>{{audio_title_lofi}}</strong>
          <span>{{audio_source_chillhop}}</span>
        </div>
      </div>
      <div class="mini-progress audio-progress"><span></span></div>
      <div class="audio-controls">
        <button type="button" title="{{action_shuffle}}"><img src="{{shuffle_icon_src}}" alt="" class="audio-control-icon" /></button>
        <button type="button" title="{{action_previous}}"><img src="{{previous_icon_src}}" alt="" class="audio-control-icon" /></button>
        <button id="audio-play-button" type="button" class="play" title="{{action_play}}" aria-pressed="false" data-play-src="{{play_icon_src}}" data-pause-src="{{pause_icon_src}}"><img src="{{play_icon_src}}" alt="" class="audio-control-icon play-icon" /></button>
        <button type="button" title="{{action_next}}"><img src="{{next_icon_src}}" alt="" class="audio-control-icon" /></button>
        <button type="button" title="{{action_loop}}"><img src="{{loop_icon_src}}" alt="" class="audio-control-icon" /></button>
      </div>
      <div class="youtube-row">
        <input type="url" placeholder="{{audio_youtube_placeholder}}">
        <button type="button">{{action_load}}</button>
      </div>
      <p>{{audio_inline_support}}</p>
    </div>

  </section>

  <script>
//__POMODORO_JS__
  </script>
</body>
</html>
